<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>소개 - 100%health</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,user-scalable=yes">
</head>
<body class="centered">
    <div id="wrapper">
        <header id="header">
            <div id="header-flex">
                <nav id="back" aria-label="뒤로가기 네비게이션">
                    <a id="backicon" href="index.html">&lt;</a>
                </nav>
                <nav id="address" class="addressbar" aria-label="경로 네비게이션">
                    <a class="addressbar" href="index.html">100%health</a>&nbsp;/
                    <a class="addressbar" href="aboutme.html">소개</a>
                </nav>
            </div>
        </header>

        <main id="main">
            <div class="section">
                <div class="content">
                    <h3>자기소개</h3>
                    <p>안녕하세요! 저는 yuinoid / いど子입니다.</p>
                    <p>여기는 yuinoid의 웹페이지 「100%health」입니다.</p>
                    
                    <h3>소개 카드</h3>
                    <div class="simple-gallery" id="about-container">
                        <!-- JavaScript로 동적 생성 -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // 소개 카드 데이터
        const aboutData = [
            {
                id: 'profile',
                title: '프로필',
                description: '웹 개발과 디자인을 좋아하는 사람입니다.',
                category: 'profile',
                icon: '👤'
            },
            {
                id: 'skills',
                title: '기술',
                description: 'HTML, CSS, JavaScript, 웹 디자인',
                category: 'skills',
                icon: '💻'
            },
            {
                id: 'interests',
                title: '관심사',
                description: '간단하고 깔끔한 디자인을 선호합니다.',
                category: 'interests',
                icon: '🎨'
            },
            {
                id: 'contact',
                title: '연락처',
                description: '궁금한 것이 있으시면 언제든 연락해주세요!',
                category: 'contact',
                icon: '📧'
            }
        ];
        
        // 소개 카드 생성
        function generateAboutCards() {
            const container = document.getElementById('about-container');
            
            aboutData.forEach((item) => {
                const cardItem = document.createElement('div');
                cardItem.className = 'gallery-item';
                cardItem.innerHTML = `
                    <div class="gallery-item-content">
                        <div class="card-icon">${item.icon}</div>
                        <p><strong>${item.title}</strong></p>
                        <p>${item.description}</p>
                    </div>
                `;
                container.appendChild(cardItem);
            });
        }
        
        // 이벤트 리스너 추가
        document.addEventListener('DOMContentLoaded', function() {
            generateAboutCards();
        });
    </script>
</body>
</html>
