<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>мҶҢк°ң - 100%health</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,user-scalable=yes">
</head>
<body class="centered">
    <div id="wrapper">
        <header id="header">
            <div id="header-flex">
                <nav id="back" aria-label="л’ӨлЎңк°Җкё° л„Өл№„кІҢмқҙм…ҳ">
                    <a id="backicon" href="index.html">&lt;</a>
                </nav>
                <nav id="address" class="addressbar" aria-label="кІҪлЎң л„Өл№„кІҢмқҙм…ҳ">
                    <a class="addressbar" href="index.html">100%health</a>&nbsp;/
                    <a class="addressbar" href="aboutme.html">мҶҢк°ң</a>
                </nav>
            </div>
        </header>

        <main id="main">
            <div class="section">
                <div class="content">
                    <h3>мһҗкё°мҶҢк°ң</h3>
                    <p>м•Ҳл…•н•ҳм„ёмҡ”! м ҖлҠ” yuinoid / гҒ„гҒ©еӯҗмһ…лӢҲлӢӨ.</p>
                    <p>м—¬кё°лҠ” yuinoidмқҳ мӣ№нҺҳмқҙм§Җ гҖҢ100%healthгҖҚмһ…лӢҲлӢӨ.</p>
                    
                    <h3>мҶҢк°ң м№ҙл“ң</h3>
                    <div class="simple-gallery" id="about-container">
                        <!-- JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let aboutData = null;
        
        // JSON лҚ°мқҙн„° лЎңл“ң
        async function loadAboutData() {
            try {
                const response = await fetch('./data/about-data.json');
                aboutData = await response.json();
                generateAboutContent();
            } catch (error) {
                console.error('мҶҢк°ң лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ:', error);
            }
        }
        
        // мҶҢк°ң мҪҳн…җмё  мғқм„ұ
        function generateAboutContent() {
            const container = document.querySelector('.content');
            let html = '';
            
            aboutData.sections.forEach(section => {
                if (section.content) {
                    html += `<p>${section.content.replace(/\n/g, '<br>')}</p>`;
                }
                if (section.cards) {
                    html += `<h3>${section.title}</h3>`;
                    html += `<div class="simple-gallery" id="about-container">`;
                    section.cards.forEach(card => {
                        html += `
                            <div class="gallery-item">
                                <div class="gallery-item-content">
                                    <div class="card-icon">${card.icon}</div>
                                    <p><strong>${card.title}</strong></p>
                                    <p>${card.description}</p>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            });
            
            container.innerHTML = html;
        }
        
        // мқҙлІӨнҠё лҰ¬мҠӨл„Ҳ м¶”к°Җ
        document.addEventListener('DOMContentLoaded', function() {
            loadAboutData();
        });
    </script>
</body>
</html>
