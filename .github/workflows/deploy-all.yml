name: Deploy to GitHub Pages, Neocities and Nekoweb

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 수동 실행 가능

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check secrets
      run: |
        echo "Checking required secrets..."
        if [ -z "${{ secrets.NEOCITIES_SITE_NAME }}" ]; then
          echo "ERROR: NEOCITIES_SITE_NAME secret is not set"
          exit 1
        fi
        if [ -z "${{ secrets.NEKOWEB_SITE_NAME }}" ]; then
          echo "ERROR: NEKOWEB_SITE_NAME secret is not set"
          exit 1
        fi
        echo "All required secrets are present"
      
    - name: Build with 11ty
      run: |
        echo "Building with environment variables:"
        echo "ELEVENTY_ENV: $ELEVENTY_ENV"
        echo "NEOCITIES_URL: $NEOCITIES_URL"
        echo "NEKOWEB_URL: $NEKOWEB_URL"
        npx @11ty/eleventy --verbose
      env:
        ELEVENTY_ENV: production
        NEOCITIES_URL: https://${{ secrets.NEOCITIES_SITE_NAME }}.neocities.org
        NEKOWEB_URL: https://${{ secrets.NEKOWEB_SITE_NAME }}.nekoweb.org
      
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      if: github.ref == 'refs/heads/main'
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_branch: gh-pages
        publish_dir: ./_site
        
    - name: Deploy to Neocities
      uses: bcomnes/deploy-to-neocities@v1
      if: github.ref == 'refs/heads/main'
      with:
        api_token: ${{ secrets.NEOCITIES_API_KEY }}
        cleanup: false
        dist_dir: _site
        
    - name: Deploy to Nekoweb
      if: github.ref == 'refs/heads/main'
      uses: ./.github/actions/deploy-nekoweb
      with:
        api_key: ${{ secrets.NEKOWEB_API_KEY }}
        site_name: ${{ secrets.NEKOWEB_SITE_NAME }}
        dist_dir: _site
        cleanup: false
