name: Deploy to GitHub Pages, Neocities and Nekoweb

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 수동 실행 가능

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Process Base64 images
      run: |
        cat > process-images.js << 'EOF'
        const fs = require('fs');
        const path = require('path');
        const https = require('https');
        
        // Base64를 Buffer로 변환하는 함수
        function base64ToBuffer(base64Data) {
          const arr = base64Data.split(',');
          const bstr = atob(arr[1]);
          let n = bstr.length;
          const u8arr = new Uint8Array(n);
          
          while (n--) {
            u8arr[n] = bstr.charCodeAt(n);
          }
          
          return Buffer.from(u8arr);
        }
        
        // Neocities에 이미지 업로드
        async function uploadToNeocities(buffer, fileName) {
          return new Promise((resolve, reject) => {
            const apiToken = process.env.NEOCITIES_API_KEY;
            const siteName = process.env.SITE_NAME || 'dakimakura';
            
            const postData = JSON.stringify({
              file: buffer.toString('base64'),
              filename: fileName
            });
            
            const options = {
              hostname: 'neocities.org',
              port: 443,
              path: '/api/upload',
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiToken}`,
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(postData)
              }
            };
            
            const req = https.request(options, (res) => {
              let data = '';
              res.on('data', (chunk) => {
                data += chunk;
              });
              
              res.on('end', () => {
                if (res.statusCode === 200) {
                  const result = JSON.parse(data);
                  resolve(`https://${siteName}.neocities.org/${fileName}`);
                } else {
                  reject(new Error(`Upload failed: ${res.statusCode} ${data}`));
                }
              });
            });
            
            req.on('error', (err) => {
              reject(err);
            });
            
            req.write(postData);
            req.end();
          });
        }
        
        // 포스트 데이터 처리
        async function processPosts() {
          try {
            const postsPath = 'src/posts.json';
            
            if (!fs.existsSync(postsPath)) {
              console.log('No posts.json file found, skipping image processing');
              return;
            }
            
            const postsData = fs.readFileSync(postsPath, 'utf8');
            const posts = JSON.parse(postsData);
            let updated = false;
            
            for (const post of posts) {
              if (post.description && post.description.ops) {
                const newOps = [];
                
                for (const op of post.description.ops) {
                  if (op.insert && op.insert.image && op.insert.image.startsWith('data:image/')) {
                    try {
                      console.log('Processing Base64 image...');
                      
                      // Base64를 Buffer로 변환
                      const buffer = base64ToBuffer(op.insert.image);
                      
                      // 고유한 파일명 생성
                      const timestamp = Date.now();
                      const randomString = Math.random().toString(36).substring(2, 15);
                      const mime = op.insert.image.match(/data:image\/([^;]+)/)[1];
                      const fileName = `images/uploaded/${timestamp}_${randomString}.${mime}`;
                      
                      // Neocities에 업로드
                      const neocitiesUrl = await uploadToNeocities(buffer, fileName);
                      
                      // 새로운 op 생성 (Neocities URL 사용)
                      newOps.push({
                        insert: {
                          image: neocitiesUrl
                        }
                      });
                      
                      console.log(`Image uploaded: ${neocitiesUrl}`);
                      updated = true;
                      
                    } catch (error) {
                      console.error('Image upload failed:', error);
                      // 실패한 경우 원본 유지
                      newOps.push(op);
                    }
                  } else {
                    newOps.push(op);
                  }
                }
                
                post.description.ops = newOps;
              }
            }
            
            if (updated) {
              // 업데이트된 포스트를 저장
              fs.writeFileSync(postsPath, JSON.stringify(posts, null, 2));
              console.log('Posts updated with Neocities URLs');
              
              // Git에 변경사항 커밋
              const { execSync } = require('child_process');
              try {
                execSync('git config --local user.email "action@github.com"');
                execSync('git config --local user.name "GitHub Action"');
                execSync('git add src/posts.json');
                execSync('git commit -m "Auto-update: Convert Base64 images to Neocities URLs"');
                execSync('git push');
                console.log('Changes committed and pushed to GitHub');
              } catch (gitError) {
                console.warn('Git operations failed:', gitError.message);
              }
            } else {
              console.log('No Base64 images found to process');
            }
            
          } catch (error) {
            console.error('Error processing posts:', error);
            // 에러가 발생해도 빌드는 계속 진행
          }
        }
        
        processPosts();
        EOF
        
        node process-images.js
      env:
        NEOCITIES_API_KEY: ${{ secrets.NEOCITIES_API_KEY }}
        SITE_NAME: ${{ secrets.SITE_NAME }}
      
    - name: Check secrets
      run: |
        echo "Checking required secrets..."
        if [ -z "${{ secrets.SITE_NAME }}" ]; then
          echo "ERROR: SITE_NAME secret is not set"
          exit 1
        fi
        echo "All required secrets are present"
      
    - name: Build with 11ty
      run: |
        echo "Building with environment variables:"
        echo "ELEVENTY_ENV: $ELEVENTY_ENV"
        echo "SITE_NAME: $SITE_NAME"
        echo "NEOCITIES_URL: $NEOCITIES_URL"
        echo "NEKOWEB_URL: $NEKOWEB_URL"
        echo "Current directory contents:"
        ls -la
        echo "Node version:"
        node --version
        echo "NPM version:"
        npm --version
        echo "Starting Eleventy build..."
        npx @11ty/eleventy || {
          echo "Eleventy build failed with exit code $?"
          echo "Checking if _site directory was created:"
          ls -la _site/ || echo "_site directory not found"
          exit 1
        }
        echo "Build completed successfully"
        echo "Final _site directory contents:"
        ls -la _site/
      env:
        ELEVENTY_ENV: production
        SITE_NAME: ${{ secrets.SITE_NAME }}
        NEOCITIES_URL: https://${{ secrets.SITE_NAME }}.neocities.org
        NEKOWEB_URL: https://${{ secrets.SITE_NAME }}.nekoweb.org
        ADMIN_SECRET_KEY: ${{ secrets.ADMIN_SECRET_KEY }}
        AUTHOR_TOKEN: ${{ secrets.AUTHOR_TOKEN }}
      
    - name: Deploy to Neocities
      uses: bcomnes/deploy-to-neocities@v1
      if: github.ref == 'refs/heads/main'
      with:
        api_token: ${{ secrets.NEOCITIES_API_KEY }}
        cleanup: false
        dist_dir: _site
        
    - name: Deploy to Nekoweb
      if: github.ref == 'refs/heads/main'
      uses: ./.github/actions/deploy-nekoweb
      with:
        api_key: ${{ secrets.NEKOWEB_API_KEY }}
        site_name: ${{ secrets.SITE_NAME }}
        dist_dir: _site
        cleanup: false
