name: Upload Images to Neocities

on:
  push:
    branches: [ main ]
    paths:
      - 'src/_data/posts.json'
  workflow_dispatch:
    inputs:
      posts_data:
        description: 'Posts JSON data with Base64 images'
        required: true
        type: string

jobs:
  upload-images:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Create image upload script
      run: |
        cat > upload-images.js << 'EOF'
        const fs = require('fs');
        const path = require('path');
        const https = require('https');
        
        // Base64лҘј BlobмңјлЎң ліҖнҷҳн•ҳлҠ” н•ЁмҲҳ
        function base64ToBlob(base64Data) {
          const arr = base64Data.split(',');
          const mime = arr[0].match(/:(.*?);/)[1];
          const bstr = atob(arr[1]);
          let n = bstr.length;
          const u8arr = new Uint8Array(n);
          
          while (n--) {
            u8arr[n] = bstr.charCodeAt(n);
          }
          
          return Buffer.from(u8arr);
        }
        
        // Neocitiesм—җ мқҙлҜём§Җ м—…лЎңл“ң
        async function uploadToNeocities(buffer, fileName) {
          return new Promise((resolve, reject) => {
            const apiToken = process.env.NEOCITIES_API_KEY;
            const siteName = process.env.SITE_NAME || 'dakimakura';
            
            const postData = JSON.stringify({
              file: buffer.toString('base64'),
              filename: fileName
            });
            
            const options = {
              hostname: 'neocities.org',
              port: 443,
              path: '/api/upload',
              method: 'POST',
              headers: {
                'Authorization': `Bearer ${apiToken}`,
                'Content-Type': 'application/json',
                'Content-Length': Buffer.byteLength(postData)
              }
            };
            
            const req = https.request(options, (res) => {
              let data = '';
              res.on('data', (chunk) => {
                data += chunk;
              });
              
              res.on('end', () => {
                if (res.statusCode === 200) {
                  const result = JSON.parse(data);
                  resolve(`https://${siteName}.neocities.org/${fileName}`);
                } else {
                  reject(new Error(`Upload failed: ${res.statusCode} ${data}`));
                }
              });
            });
            
            req.on('error', (err) => {
              reject(err);
            });
            
            req.write(postData);
            req.end();
          });
        }
        
        // нҸ¬мҠӨнҠё лҚ°мқҙн„° мІҳлҰ¬
        async function processPosts() {
          try {
            const postsData = fs.readFileSync('src/_data/posts.json', 'utf8');
            const posts = JSON.parse(postsData).posts || [];
            let updated = false;
            
            for (const post of posts) {
              if (post.description && post.description.ops) {
                const newOps = [];
                
                for (const op of post.description.ops) {
                  if (op.insert && op.insert.image && op.insert.image.startsWith('data:image/')) {
                    try {
                      console.log('Processing Base64 image...');
                      
                      // Base64лҘј BufferлЎң ліҖнҷҳ
                      const buffer = base64ToBlob(op.insert.image);
                      
                      // кі мң н•ң нҢҢмқјлӘ… мғқм„ұ
                      const timestamp = Date.now();
                      const randomString = Math.random().toString(36).substring(2, 15);
                      const mime = op.insert.image.match(/data:image\/([^;]+)/)[1];
                      const fileName = `images/uploaded/${timestamp}_${randomString}.${mime}`;
                      
                      // Neocitiesм—җ м—…лЎңл“ң
                      const neocitiesUrl = await uploadToNeocities(buffer, fileName);
                      
                      // мғҲлЎңмҡҙ op мғқм„ұ (Neocities URL мӮ¬мҡ©)
                      newOps.push({
                        insert: {
                          image: neocitiesUrl
                        }
                      });
                      
                      console.log(`Image uploaded: ${neocitiesUrl}`);
                      updated = true;
                      
                    } catch (error) {
                      console.error('Image upload failed:', error);
                      // мӢӨнҢЁн•ң кІҪмҡ° мӣҗліё мң м§Җ
                      newOps.push(op);
                    }
                  } else {
                    newOps.push(op);
                  }
                }
                
                post.description.ops = newOps;
              }
            }
            
            if (updated) {
              // м—…лҚ°мқҙнҠёлҗң нҸ¬мҠӨнҠёлҘј GitHubм—җ м ҖмһҘ
              const fs = require('fs');
              fs.writeFileSync('src/_data/posts.json', JSON.stringify(posts, null, 2));
              console.log('Posts updated with Neocities URLs');
            }
            
          } catch (error) {
            console.error('Error processing posts:', error);
            process.exit(1);
          }
        }
        
        processPosts();
        EOF
        
    - name: Upload images to Neocities
      run: node upload-images.js
      env:
        NEOCITIES_API_KEY: ${{ secrets.NEOCITIES_API_KEY }}
        SITE_NAME: dakimakura
        
    - name: Commit and push changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add src/_data/posts.json
        git commit -m "Update posts with Neocities image URLs" || exit 0
        git push