name: Deploy to Nekoweb

on:
  push:
    branches: [ main ]
  workflow_dispatch: # 수동 실행 가능

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build with 11ty
      run: npx @11ty/eleventy
      env:
        ELEVENTY_ENV: production
        NEOCITIES_URL: https://${{ secrets.NEOCITIES_SITE_NAME }}.neocities.org
        NEKOWEB_URL: https://${{ secrets.NEKOWEB_SITE_NAME }}.nekoweb.org
        
    - name: Deploy to Nekoweb
      uses: ./.github/actions/deploy-nekoweb
      with:
        api_key: ${{ secrets.NEKOWEB_API_KEY }}
        site_name: ${{ secrets.NEKOWEB_SITE_NAME }}
        dist_dir: _site
        cleanup: false
