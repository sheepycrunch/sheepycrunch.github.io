name: Deploy to Neocities

on:
  # 비활성화됨 - deploy-all.yml에서 통합 관리
  # push:
  #   branches: [ main ]
  workflow_dispatch: # 수동 실행 가능

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build with 11ty
      run: npx @11ty/eleventy
      env:
        ELEVENTY_ENV: production
        NEOCITIES_URL: https://${{ secrets.NEOCITIES_SITE_NAME }}.neocities.org
        NEKOWEB_URL: https://${{ secrets.NEKOWEB_SITE_NAME }}.nekoweb.org
        
    - name: Deploy to Neocities
      uses: bcomnes/deploy-to-neocities@v1
      with:
        api_token: ${{ secrets.NEOCITIES_API_KEY }}
        cleanup: false
        dist_dir: _site
