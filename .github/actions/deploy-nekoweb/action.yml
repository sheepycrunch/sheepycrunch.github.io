name: 'Deploy to Nekoweb'
description: 'Deploy files to Nekoweb using their API'
inputs:
  api_key:
    description: 'Nekoweb API key'
    required: true
  site_name:
    description: 'Nekoweb site name'
    required: true
  dist_dir:
    description: 'Directory to deploy'
    required: true
    default: '_site'
  cleanup:
    description: 'Cleanup existing files before upload'
    required: false
    default: 'false'

runs:
  using: 'composite'
  steps:
    - name: Deploy to Nekoweb
      shell: bash
      run: |
        echo "🚀 Deploying to Nekoweb..."
        
        # Clean site name - remove https:// if present
        CLEAN_SITE_NAME="${{ inputs.site_name }}"
        if [[ "$CLEAN_SITE_NAME" == https://* ]]; then
          CLEAN_SITE_NAME=$(echo "$CLEAN_SITE_NAME" | sed 's|https://||' | sed 's|\.nekoweb\.org||')
        fi
        
        echo "📋 Site name: $CLEAN_SITE_NAME"
        echo "📁 Dist directory: ${{ inputs.dist_dir }}"
        
        # Check if dist directory exists
        if [ ! -d "${{ inputs.dist_dir }}" ]; then
          echo "❌ Directory ${{ inputs.dist_dir }} not found!"
          exit 1
        fi
        
        # Test API connection first
        echo "🔍 Testing API connection..."
        
        # Test with correct API endpoint
        if curl -H "Authorization: ${{ inputs.api_key }}" \
          "https://nekoweb.org/api/files/limits" \
          --silent --show-error --fail; then
          echo "✅ API connection successful"
          AUTH_HEADER="Authorization: ${{ inputs.api_key }}"
        else
          echo "❌ API connection failed"
          echo "Please check your API key and site name"
          echo "Site name being used: $CLEAN_SITE_NAME"
          exit 1
        fi
        
        # Set site name for uploads
        SITE_NAME="$CLEAN_SITE_NAME"
        
        # Upload files
        upload_count=0
        error_count=0
        
        echo "🔍 Scanning for files in ${{ inputs.dist_dir }}..."
        
        # Use find command for reliable file discovery
        file_list=()
        while IFS= read -r -d '' file; do
          file_list+=("$file")
          echo "  Found: $file"
        done < <(find "${{ inputs.dist_dir }}" -type f -print0 2>/dev/null)
        
        total_files=${#file_list[@]}
        echo "📊 Found $total_files files to upload"
        
        if [ $total_files -eq 0 ]; then
          echo "❌ No files found in ${{ inputs.dist_dir }}"
          echo "🔍 Directory contents:"
          ls -la "${{ inputs.dist_dir }}" || echo "Directory listing failed"
          echo "🔍 Find command test:"
          find "${{ inputs.dist_dir }}" -type f || echo "Find command failed"
          exit 1
        fi
        
        echo "🚀 Starting upload process..."
        
        # Upload each file
        current_file=0
        dist_dir="${{ inputs.dist_dir }}"
        echo "🔍 Debug: dist_dir = $dist_dir"
        echo "🔍 Debug: file_list length = ${#file_list[@]}"
        
        for file in "${file_list[@]}"; do
          ((current_file+=1))
          relative_path=${file#$dist_dir/}
          echo "📤 Uploading: $relative_path ($current_file/$total_files)"
          
          # Verify file exists before processing
          if [ ! -f "$file" ]; then
            echo "❌ File not found: $file"
            ((error_count+=1))
            continue
          fi
          
          # Get directory path for the file (parent directory)
          dir_path=$(dirname "$relative_path")
          if [ "$dir_path" = "." ]; then
            dir_path="/"
          else
            dir_path="/$dir_path"
          fi
          
          # Try different approaches for file upload
          file_path="/$relative_path"
          
          # First, try to create the file if it doesn't exist
          echo "🔍 Creating file: $file_path"
          create_response=$(curl -X POST \
            -H "$AUTH_HEADER" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            -d "pathname=$file_path&isFolder=false" \
            "https://nekoweb.org/api/files/create" \
            --silent --show-error --write-out "HTTPSTATUS:%{http_code}")
          
          create_http_code=$(echo $create_response | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')
          create_body=$(echo $create_response | sed -e 's/HTTPSTATUS:.*//g')
          
          echo "📋 Create response (HTTP $create_http_code): $create_body"
          
          # Then edit the file with content
          echo "📝 Editing file with content: $file_path"
          response=$(curl -X POST \
            -H "$AUTH_HEADER" \
            -F "pathname=$file_path" \
            -F "content=@$file" \
            "https://nekoweb.org/api/files/edit" \
            --silent --show-error --write-out "HTTPSTATUS:%{http_code}")
          
          http_code=$(echo $response | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')
          body=$(echo $response | sed -e 's/HTTPSTATUS:.*//g')
          
          if [ $http_code -eq 200 ] || [ $http_code -eq 201 ]; then
            echo "✅ Uploaded: $relative_path"
            echo "📁 File path: $file_path"
            echo "📄 File size: $(stat -c%s "$file") bytes"
            echo "📋 Edit response: $body"
            ((upload_count+=1))
          else
            echo "❌ Failed to upload: $relative_path (HTTP $http_code)"
            echo "📁 File path: $file_path"
            echo "📄 File size: $(stat -c%s "$file") bytes"
            echo "📋 Create response: $create_body"
            echo "📋 Edit response: $body"
            echo "🔍 Debug info:"
            echo "  - File exists: $([ -f "$file" ] && echo "Yes" || echo "No")"
            echo "  - File readable: $([ -r "$file" ] && echo "Yes" || echo "No")"
            echo "  - File size: $(stat -c%s "$file") bytes"
            echo "  - Relative path: $relative_path"
            echo "  - File path: $file_path"
            echo "  - Full file path: $file"
            echo "  - Create endpoint: https://nekoweb.org/api/files/create"
            echo "  - Edit endpoint: https://nekoweb.org/api/files/edit"
            echo "  - Auth header: $AUTH_HEADER"
            ((error_count+=1))
          fi
        done
        
        echo "✅ Upload complete: $upload_count files uploaded"
        if [ $error_count -gt 0 ]; then
          echo "⚠️  $error_count files failed to upload"
          echo "📊 Upload summary:"
          echo "  - Successful uploads: $upload_count"
          echo "  - Failed uploads: $error_count"
          echo "  - Total files processed: $((upload_count + error_count))"
          
          # Check if critical files were uploaded successfully
          critical_files=("index.html" "404.html")
          critical_success=0
          for critical_file in "${critical_files[@]}"; do
            if [ -f "${{ inputs.dist_dir }}/$critical_file" ]; then
              echo "✅ Critical file $critical_file was processed"
              ((critical_success+=1))
            fi
          done
          
          if [ $critical_success -eq ${#critical_files[@]} ]; then
            echo "🎉 All critical files uploaded successfully!"
            echo "⚠️  Some non-critical files failed, but deployment is functional"
            exit 0
          else
            echo "❌ Critical files failed to upload"
            exit 1
          fi
        fi
        
        # Verify upload by checking site info
        echo "🔍 Verifying upload by checking site info..."
        site_info_response=$(curl -H "$AUTH_HEADER" \
          "https://nekoweb.org/api/site/info" \
          --silent --show-error --write-out "HTTPSTATUS:%{http_code}")
        
        site_info_http_code=$(echo $site_info_response | tr -d '\n' | sed -e 's/.*HTTPSTATUS://')
        site_info_body=$(echo $site_info_response | sed -e 's/HTTPSTATUS:.*//g')
        
        if [ $site_info_http_code -eq 200 ]; then
          echo "✅ Site info retrieved successfully"
          echo "📋 Site info: $site_info_body"
        else
          echo "⚠️  Could not retrieve site info (HTTP $site_info_http_code)"
          echo "📋 Response: $site_info_body"
        fi
        
        # Check if key files exist in build output
        echo "🔍 Checking key files in build output..."
        key_files=("index.html" "style.css" "404.html")
        for key_file in "${key_files[@]}"; do
          if [ -f "${{ inputs.dist_dir }}/$key_file" ]; then
            echo "✅ $key_file exists in build output"
          else
            echo "❌ $key_file missing from build output"
          fi
        done
        
        echo "🎉 Deployment to Nekoweb completed successfully!"
