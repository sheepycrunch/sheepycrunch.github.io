<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>글 - 100%health</title>
    <link rel="stylesheet" href="../style.css">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,user-scalable=yes">
</head>
<body class="centered">
    <div id="wrapper">
        <header id="header">
            <div id="header-flex">
                <nav id="back" aria-label="뒤로가기 네비게이션">
                    <a id="backicon" href="../index.html">&lt;</a>
                </nav>
                <nav id="address" class="addressbar" aria-label="경로 네비게이션">
                    <a class="addressbar" href="../index.html">100%health</a>&nbsp;/
                    <a class="addressbar" href="txt_main.html">글</a>
                </nav>
            </div>
        </header>

        <main id="main">
            <div class="section">
                <div class="content">
                    <h3>글 모음</h3>
                    <p>다양한 주제의 글들과 일기들을 모아둔 곳입니다.</p>
                    
                    <h3>문서</h3>
                    <div class="simple-gallery" id="documents-container">
                        <!-- JavaScript로 동적 생성 -->
                    </div>
                    
                    <h3>일기</h3>
                    <div class="simple-gallery" id="diary-container">
                        <!-- JavaScript로 동적 생성 -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        // 문서 데이터
        const documentData = [
            {
                id: 'intro',
                title: '100%health 소개',
                description: '이 사이트에 대한 소개글입니다.',
                category: 'documents',
                date: '2024-01-15',
                link: '100phealth_introduction.html'
            },
            {
                id: 'webdev',
                title: '웹 개발 노트',
                description: '웹 개발 과정에서 배운 것들을 정리한 노트입니다.',
                category: 'documents',
                date: '2024-01-20',
                link: 'web_development_notes.html'
            },
            {
                id: 'design',
                title: '디자인 생각',
                description: '디자인에 대한 생각과 경험을 담은 글입니다.',
                category: 'documents',
                date: '2024-01-25',
                link: 'design_thoughts.html'
            }
        ];
        
        // 일기 데이터
        const diaryData = [
            {
                id: 'diary2024',
                title: '2024년 일기',
                description: '2024년에 작성한 일기 모음입니다.',
                category: 'diary',
                date: '2024-12-31',
                link: 'diary_2024.html'
            },
            {
                id: 'diary2025',
                title: '2025년 일기',
                description: '2025년에 작성한 일기 모음입니다.',
                category: 'diary',
                date: '2025-01-01',
                link: 'diary_2025.html'
            }
        ];
        
        // 문서 카드 생성
        function generateDocumentCards() {
            const container = document.getElementById('documents-container');
            
            documentData.forEach((item) => {
                const cardItem = document.createElement('div');
                cardItem.className = 'gallery-item';
                cardItem.innerHTML = `
                    <div class="gallery-item-content">
                        <a href="${item.link}" class="card-link">
                            <p><strong>${item.title}</strong></p>
                            <p>${item.description}</p>
                            <p class="gallery-date">${item.date}</p>
                        </a>
                    </div>
                `;
                container.appendChild(cardItem);
            });
        }
        
        // 일기 카드 생성
        function generateDiaryCards() {
            const container = document.getElementById('diary-container');
            
            diaryData.forEach((item) => {
                const cardItem = document.createElement('div');
                cardItem.className = 'gallery-item';
                cardItem.innerHTML = `
                    <div class="gallery-item-content">
                        <a href="${item.link}" class="card-link">
                            <p><strong>${item.title}</strong></p>
                            <p>${item.description}</p>
                            <p class="gallery-date">${item.date}</p>
                        </a>
                    </div>
                `;
                container.appendChild(cardItem);
            });
        }
        
        // 이벤트 리스너 추가
        document.addEventListener('DOMContentLoaded', function() {
            generateDocumentCards();
            generateDiaryCards();
        });
    </script>
</body>
</html>
