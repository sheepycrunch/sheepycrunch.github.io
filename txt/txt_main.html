<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>кёҖ - 100%health</title>
    <link rel="stylesheet" href="../style.css">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,user-scalable=yes">
</head>
<body class="centered">
    <div id="wrapper">
        <header id="header">
            <div id="header-flex">
                <nav id="back" aria-label="л’ӨлЎңк°Җкё° л„Өл№„кІҢмқҙм…ҳ">
                    <a id="backicon" href="../index.html">&lt;</a>
                </nav>
                <nav id="address" class="addressbar" aria-label="кІҪлЎң л„Өл№„кІҢмқҙм…ҳ">
                    <a class="addressbar" href="../index.html">100%health</a>&nbsp;/
                    <a class="addressbar" href="txt_main.html">кёҖ</a>
                </nav>
            </div>
        </header>

        <main id="main">
            <div class="section">
                <div class="content">
                    <h3>кёҖ лӘЁмқҢ</h3>
                    <p>лӢӨм–‘н•ң мЈјм ңмқҳ кёҖл“Өкіј мқјкё°л“Өмқ„ лӘЁм•„л‘” кіімһ…лӢҲлӢӨ.</p>
                    
                    <h3>л¬ём„ң</h3>
                    <div class="simple-gallery" id="documents-container">
                        <!-- JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
                    </div>
                    
                    <h3>мқјкё°</h3>
                    <div class="simple-gallery" id="diary-container">
                        <!-- JavaScriptлЎң лҸҷм Ғ мғқм„ұ -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let textData = null;
        
        // JSON лҚ°мқҙн„° лЎңл“ң
        async function loadTextData() {
            try {
                const response = await fetch('../data/text-data.json');
                textData = await response.json();
                generateTextContent();
            } catch (error) {
                console.error('н…ҚмҠӨнҠё лҚ°мқҙн„° лЎңл“ң мӢӨнҢЁ:', error);
            }
        }
        
        // н…ҚмҠӨнҠё мҪҳн…җмё  мғқм„ұ
        function generateTextContent() {
            const container = document.querySelector('.content');
            let html = '';
            
            textData.sections.forEach(section => {
                if (section.content) {
                    html += `<p>${section.content}</p>`;
                }
                if (section.items) {
                    html += `<h3>${section.title}</h3>`;
                    html += `<div class="simple-gallery" id="${section.title.toLowerCase().replace(/\s+/g, '-')}-container">`;
                    section.items.forEach(item => {
                        html += `
                            <div class="gallery-item">
                                <div class="gallery-item-content">
                                    <a href="${item.link}" class="card-link">
                                        <p><strong>${item.title}</strong></p>
                                        <p>${item.description}</p>
                                        <p class="gallery-date">${item.date}</p>
                                    </a>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            });
            
            container.innerHTML = html;
        }
        
        // мқҙлІӨнҠё лҰ¬мҠӨл„Ҳ м¶”к°Җ
        document.addEventListener('DOMContentLoaded', function() {
            loadTextData();
        });
    </script>
</body>
</html>
