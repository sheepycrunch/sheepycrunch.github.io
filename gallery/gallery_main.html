<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>낙서 - 100%health</title>
    <link rel="stylesheet" href="../style.css">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,user-scalable=yes">
</head>
<body class="centered">
    <div id="wrapper">
        <header id="header">
            <div id="header-flex">
                <nav id="back" aria-label="뒤로가기 네비게이션">
                    <a id="backicon" href="../index.html">&lt;</a>
                </nav>
                <nav id="address" class="addressbar" aria-label="경로 네비게이션">
                    <a class="addressbar" href="../index.html">100%health</a>&nbsp;/
                    <a class="addressbar" href="gallery_main.html">낙서</a>
                </nav>
            </div>
        </header>

        <main id="main">
            <div class="section">
                <div class="content">
                    <h3>그림 모음</h3>
                    <p>간단한 낙서와 그림들을 모아둔 곳입니다.</p>
                    
                    <h3>최근 작품</h3>
                    <div class="simple-gallery" id="gallery-container">
                        <!-- JavaScript로 동적 생성 -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <!-- 라이트박스 -->
    <div class="lum-lightbox" id="lightbox">
        <div class="lum-lightbox-inner">
            <div class="lum-lightbox-loader"></div>
            <div class="lum-lightbox-image-wrapper">
                <span class="lum-lightbox-position-helper">
                    <img class="lum-img" src="" alt="">
                </span>
            </div>
        </div>
        <div class="lum-close-button"></div>
    </div>
    
    <script>
        let galleryData = null;
        let lightboxImages = [];
        let currentImageIndex = 0;
        
        // JSON 데이터 로드
        async function loadGalleryData() {
            try {
                const response = await fetch('../data/gallery-data.json');
                galleryData = await response.json();
                generateGalleryMenu();
            } catch (error) {
                console.error('갤러리 데이터 로드 실패:', error);
            }
        }
        
        // 갤러리 메뉴 생성
        function generateGalleryMenu() {
            const container = document.getElementById('gallery-container');
            container.innerHTML = '';
            
            galleryData.categories.forEach(category => {
                // 카테고리 섹션 생성
                const categorySection = document.createElement('div');
                categorySection.className = 'gallery-category';
                categorySection.innerHTML = `
                    <h3 class="category-title">
                        <a href="${category.link}" class="category-link">${category.name}</a>
                    </h3>
                    <div class="category-items"></div>
                `;
                
                const itemsContainer = categorySection.querySelector('.category-items');
                
                // 카테고리 아이템들 생성
                if (category.items) {
                    category.items.forEach(item => {
                        const itemElement = createGalleryItem(item);
                        itemsContainer.appendChild(itemElement);
                    });
                }
                
                container.appendChild(categorySection);
            });
        }
        
        // 갤러리 아이템 생성
        function createGalleryItem(item) {
            const itemDiv = document.createElement('div');
            itemDiv.className = 'gallery-item';
            
            let thumbnailHtml = '';
            if (item.thumbnail) {
                thumbnailHtml = `<img src="../${item.thumbnail}" class="gallery-thumbnail" alt="${item.name}">`;
            }
            
            let subItemsHtml = '';
            if (item.subItems && item.subItems.length > 0) {
                subItemsHtml = '<div class="sub-items">';
                item.subItems.forEach(subItem => {
                    let subThumbnailHtml = '';
                    if (subItem.thumbnail) {
                        subThumbnailHtml = `<img src="../${subItem.thumbnail}" class="sub-thumbnail" alt="${subItem.name}">`;
                    }
                    subItemsHtml += `
                        <div class="sub-item">
                            <a href="${subItem.link}" class="sub-link">
                                ${subThumbnailHtml}
                                <span class="sub-name">${subItem.name}</span>
                            </a>
                        </div>
                    `;
                });
                subItemsHtml += '</div>';
            }
            
            itemDiv.innerHTML = `
                <div class="gallery-item-content">
                    <a href="${item.link}" class="item-link">
                        ${thumbnailHtml}
                        <p><strong>${item.name}</strong></p>
                    </a>
                    ${subItemsHtml}
                </div>
            `;
            
            return itemDiv;
        }
        
        // 라이트박스 열기
        function openLightbox(imageSrc, imageTitle) {
            const lightbox = document.getElementById('lightbox');
            const img = lightbox.querySelector('.lum-img');
            
            img.src = imageSrc;
            img.alt = imageTitle;
            
            lightbox.classList.add('show');
            document.body.style.overflow = 'hidden';
        }
        
        // 라이트박스 닫기
        function closeLightbox() {
            const lightbox = document.getElementById('lightbox');
            lightbox.classList.remove('show');
            document.body.style.overflow = 'auto';
        }
        
        // 이벤트 리스너 추가
        document.addEventListener('DOMContentLoaded', function() {
            loadGalleryData();
            
            // 라이트박스 이벤트
            document.querySelector('.lum-close-button').addEventListener('click', closeLightbox);
            
            // ESC 키로 닫기
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    closeLightbox();
                }
            });
            
            // 배경 클릭으로 닫기
            document.getElementById('lightbox').addEventListener('click', function(e) {
                if (e.target === this) {
                    closeLightbox();
                }
            });
        });
    </script>
</body>
</html>
