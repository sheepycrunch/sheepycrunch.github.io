<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <title>아카이브 - 100%health</title>
    <link rel="stylesheet" href="../style.css">
    <meta name="viewport" content="width=device-width,initial-scale=1.0,minimum-scale=1.0,user-scalable=yes">
</head>
<body class="centered">
    <div id="wrapper">
        <header id="header">
            <div id="header-flex">
                <nav id="back" aria-label="뒤로가기 네비게이션">
                    <a id="backicon" href="../index.html">&lt;</a>
                </nav>
                <nav id="address" class="addressbar" aria-label="경로 네비게이션">
                    <a class="addressbar" href="../index.html">100%health</a>&nbsp;/
                    <a class="addressbar" href="archive_main.html">아카이브</a>
                </nav>
            </div>
        </header>

        <main id="main">
            <div class="section">
                <div class="content">
                    <h3>과거 자료</h3>
                    <p>이전에 작성한 글들과 자료들을 모아둔 곳입니다.</p>
                    
                    <h3>연도별 아카이브</h3>
                    <div class="simple-gallery" id="yearly-container">
                        <!-- JavaScript로 동적 생성 -->
                    </div>
                    
                    <h3>카테고리별 아카이브</h3>
                    <div class="simple-gallery" id="category-container">
                        <!-- JavaScript로 동적 생성 -->
                    </div>
                </div>
            </div>
        </main>
    </div>
    
    <script>
        let archiveData = null;
        
        // JSON 데이터 로드
        async function loadArchiveData() {
            try {
                const response = await fetch('../data/archive-data.json');
                archiveData = await response.json();
                generateArchiveContent();
            } catch (error) {
                console.error('아카이브 데이터 로드 실패:', error);
            }
        }
        
        // 아카이브 콘텐츠 생성
        function generateArchiveContent() {
            const container = document.querySelector('.content');
            let html = '';
            
            archiveData.sections.forEach(section => {
                if (section.content) {
                    html += `<h3><span aria-hidden="true">♥</span>${section.title}</h3>`;
                    html += `<p>${section.content}</p>`;
                }
                if (section.items) {
                    html += `<h3>${section.title}</h3>`;
                    html += `<div class="simple-gallery" id="${section.title.toLowerCase().replace(/\s+/g, '-')}-container">`;
                    section.items.forEach(item => {
                        html += `
                            <div class="gallery-item">
                                <div class="gallery-item-content">
                                    <a href="${item.link}" class="card-link">
                                        <div class="card-icon">${item.icon}</div>
                                        <p><strong>${item.title}</strong></p>
                                        <p>${item.description}</p>
                                        <p class="gallery-date">${item.date}</p>
                                    </a>
                                </div>
                            </div>
                        `;
                    });
                    html += `</div>`;
                }
            });
            
            container.innerHTML = html;
        }
        
        // 이벤트 리스너 추가
        document.addEventListener('DOMContentLoaded', function() {
            loadArchiveData();
        });
    </script>
</body>
</html>
